<body class="antialiased">

    <button type="button" id="btn-search-mobile" class="nav-icon p-2" title="Cari catatan" aria-label="Cari catatan">

    </button>
    <a href="perpustakaan.html" class="nav-icon p-2" title="Perpustakaan" aria-label="Buka perpustakaan buku">

  </nav>

  <!-- ============ Konten utama ============ -->
  <main class="lg:pl-20 pb-24 lg:pb-0 min-h-screen">
    <div class="max-w-3xl mx-auto px-6 py-12 lg:py-16">

      <header class="mb-10">
        <h1 class="font-display text-3xl sm:text-4xl text-ink">Points of Curiosity</h1>
        <p class="mt-2 text-sm text-stone-500">Catatan pertanyaan yang sudah terjawab saat membaca.</p>
      </header>

      <!-- Search bar, disembunyikan sampai icon search di nav diklik -->
      <div id="search-wrapper" class="overflow-hidden transition-all duration-300 ease-out" style="max-height: 0px;">
        <div class="pb-6">
          <label for="search-input" class="sr-only">Cari catatan</label>
          <input
            type="text"
            id="search-input"
            placeholder="Cari berdasarkan judul atau kategori..."
            class="w-full border border-stone-300 rounded-md px-4 py-2.5 text-sm bg-white placeholder:text-stone-400 outline-none"
          />
        </div>
      </div>

      <!-- Toggle mode tampilan -->
      <div class="flex items-center justify-between mb-6">
        <p id="result-count" class="text-xs text-stone-400 tracking-wide uppercase" aria-live="polite"></p>
        <div role="group" aria-label="Pilih mode tampilan" class="inline-flex border border-stone-200 rounded-md overflow-hidden">
          <button type="button" data-mode="katalog" class="mode-btn">Katalog</button>
          <button type="button" data-mode="card" class="mode-btn">Card</button>
        </div>
      </div>

      <!-- Daftar catatan, dirender oleh JS -->
      <div id="content-list" class="view-transition" aria-live="polite"></div>

    </div>
  </main>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    /**

     * Array ini mensimulasikan bentuk dist/data/katalog.json hasil ekspor
     * export.js. Dipakai sebagai fallback otomatis kalau fetch('./data/katalog.json')
     * gagal -- misalnya saat file ini dibuka langsung lewat file:// tanpa
     * server, atau saat folder dist/data/ belum pernah diekspor.
     *
     * Begitu kamu menjalankan `npm run export` dan menaruh folder dist/data/
     * di sebelah file ini (lalu membukanya lewat server lokal / GitHub Pages),
     * halaman ini otomatis memakai data ASLI tanpa perlu ubah kode apa pun.
     * ---------------------------------------------------------------------
     */
    const DUMMY_KATALOG = [

      },
      {
        id: 6,
        judul: "Kenapa Langit Berwarna Biru, Bukan Hijau?",
        slug: "kenapa-langit-berwarna-biru-bukan-hijau",

        ringkasan: "Pertanyaan Kalau cahaya matahari berisi semua warna, kenapa langit yang kita lihat selalu biru, bukan hijau atau ungu? Jawaban Singkat Ini karena hamburan Rayle..."
      },
      {
        id: 5,
        judul: "Apa Bedanya Resesi dan Depresi Ekonomi?",
        slug: "apa-bedanya-resesi-dan-depresi-ekonomi",
        kategori: "Ekonomi",
        tanggal_dibuat: "2026-06-10 11:00:00",
        ringkasan: "Resesi umumnya didefinisikan sebagai penurunan PDB dua kuartal berturut turut. Depresi adalah resesi yang jauh lebih parah, berlangsung lebih lama (bisa bertahu..."
      },
      {
        id: 4,
        judul: "Kenapa Air Laut Asin tapi Air Hujan Tidak?",
        slug: "kenapa-air-laut-asin-tapi-air-hujan-tidak",
        kategori: "Sains",

        ringkasan: "Air hujan berasal dari penguapan, proses yang meninggalkan garam dan mineral di belakang. Air sungai yang mengalir ke laut membawa mineral dari batuan, dan kare..."
      },
      {
        id: 3,
        judul: "Asal Mula Sistem Penanggalan Gregorian",
        slug: "asal-mula-sistem-penanggalan-gregorian",
        kategori: "Sejarah",

        ringkasan: "Kalender Gregorian diperkenalkan Paus Gregorius XIII pada 1582 untuk memperbaiki pergeseran kalender Julian terhadap musim semi (equinox). Pergeseran ini terjad..."
      },
      {
        id: 2,
        judul: "Apa Itu Idempoten dalam Pemrograman?",
        slug: "apa-itu-idempoten-dalam-pemrograman",
        kategori: "Teknologi",

        ringkasan: "Operasi disebut idempoten kalau dijalankan berkali kali hasilnya tetap sama seperti dijalankan sekali. Contoh: PUT /user/1 {name: 'Budi'} idempoten. Contoh buka..."
      },
      {
        id: 1,
        judul: "Mengapa Kita Lupa Apa yang Baru Dibaca?",
        slug: "mengapa-kita-lupa-apa-yang-baru-dibaca",
        kategori: "Psikologi",
        tanggal_dibuat: "2026-05-02 09:15:00",
        ringkasan: "Pertanyaan Kenapa otak cenderung membuang detail bacaan padahal baru beberapa jam lalu dibaca? Jawaban Singkat Ini berkaitan dengan kurva lupa Ebbinghaus . Tanp..."
      }
    ];

    const state = { data: [], mode: "katalog", query: "" };
    const reduceMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

    async function loadKatalog() {
      try {
        const res = await fetch("data/katalog.json");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const json = await res.json();
        if (!Array.isArray(json)) throw new Error("Format katalog.json tidak sesuai");
        return json;
      } catch (err) {
        console.warn("[POC] Gagal memuat ./data/katalog.json, memakai data contoh (mode demo). Detail:", err.message);
        return DUMMY_KATALOG;
      }
    }

    function formatTanggal(raw) {
      const d = new Date(String(raw).replace(" ", "T"));
      if (isNaN(d.getTime())) return raw;
      const bulan = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];
      return `${String(d.getDate()).padStart(2, "0")} ${bulan[d.getMonth()]} ${d.getFullYear()}`;
    }

    function escapeHTML(str) {
      const div = document.createElement("div");
      div.textContent = String(str ?? "");
      return div.innerHTML;
    }

    function getFilteredData() {
      const q = state.query.trim().toLowerCase();
      if (!q) return state.data;
      return state.data.filter(
        (item) =>
          item.judul.toLowerCase().includes(q) ||
          (item.kategori || "").toLowerCase().includes(q)
      );
    }

    function emptyStateHTML() {
      return `
        <div class="text-center py-16 border border-dashed border-stone-300 rounded-md">
          <p class="text-sm text-stone-500">Belum ada catatan yang cocok dengan pencarian ini. Coba kata kunci lain.</p>
        </div>`;
    }

    function renderKatalog(items) {
      if (items.length === 0) return emptyStateHTML();
      return `
        <ul class="divide-y divide-stone-200">
          ${items
            .map(
              (item) => `
            <li>
              <a href="artikel.html#${encodeURIComponent(item.slug)}" class="toc-row">
                <span class="toc-title">${escapeHTML(item.judul)}</span>
                <span class="toc-leader"></span>
                <span class="text-xs text-stone-400 tabular-nums whitespace-nowrap">${formatTanggal(item.tanggal_dibuat)}</span>
              </a>
            </li>`
            )
            .join("")}
        </ul>`;
    }

    function renderCard(items) {
      if (items.length === 0) return emptyStateHTML();
      return `
        <div class="grid gap-4 sm:grid-cols-2">
          ${items
            .map(
              (item) => `
            <a href="artikel.html#${encodeURIComponent(item.slug)}" class="card-link">
              <div class="flex items-center justify-between mb-2.5">
                <span class="tag-pill">${escapeHTML(item.kategori || "Umum")}</span>
                <span class="text-xs text-stone-400 tabular-nums">${formatTanggal(item.tanggal_dibuat)}</span>
              </div>
              <h2 class="font-display text-lg text-ink mb-1.5 leading-snug">${escapeHTML(item.judul)}</h2>
              <p class="text-sm text-slate-600 line-clamp-2">${escapeHTML(item.ringkasan || "")}</p>
            </a>`
            )
            .join("")}
        </div>`;
    }

    function renderContent() {
      const container = document.getElementById("content-list");
      const items = getFilteredData();
      const html = state.mode === "katalog" ? renderKatalog(items) : renderCard(items);
      document.getElementById("result-count").textContent = `${items.length} catatan`;

      if (reduceMotion) {
        container.innerHTML = html;
        return;
      }

      container.classList.add("view-hidden");
      setTimeout(() => {
        container.innerHTML = html;
        requestAnimationFrame(() => container.classList.remove("view-hidden"));
      }, 220);
    }

    function setMode(mode) {
      state.mode = mode;
      document.querySelectorAll(".mode-btn").forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.mode === mode);
      });
      renderContent();
    }

    function toggleSearch() {
      const wrapper = document.getElementById("search-wrapper");
      const isOpen = wrapper.style.maxHeight !== "0px" && wrapper.style.maxHeight !== "";
      wrapper.style.maxHeight = isOpen ? "0px" : "80px";
      if (!isOpen) setTimeout(() => document.getElementById("search-input").focus(), 280);
    }

    document.addEventListener("DOMContentLoaded", async () => {
      lucide.createIcons();

      document.querySelectorAll(".mode-btn").forEach((btn) => {
        btn.addEventListener("click", () => setMode(btn.dataset.mode));
      });

      document.getElementById("btn-search-desktop").addEventListener("click", toggleSearch);
      document.getElementById("btn-search-mobile").addEventListener("click", toggleSearch);
      document.getElementById("search-input").addEventListener("input", (e) => {
        state.query = e.target.value;
        renderContent();
      });

      state.data = await loadKatalog();
      setMode("katalog");

      if (window.location.hash === "#search") toggleSearch();
    });
  </script>
</body>
</html>
