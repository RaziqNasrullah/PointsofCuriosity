<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Perpustakaan — Points of Curiosity</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Merriweather:ital,wght@0,400;0,700;1,400&display=swap"
  rel="stylesheet"
/>

<link rel="stylesheet" href="tailwind.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body class="antialiased">

  <!-- ============ Navigasi: sidebar di desktop, bottom bar di mobile/tablet ============ -->
  <nav aria-label="Navigasi utama" class="hidden lg:flex lg:flex-col lg:items-center lg:fixed lg:inset-y-0 lg:left-0 lg:w-20 lg:py-8 lg:border-r lg:border-stone-200 lg:bg-white lg:z-30">
    <a href="index.html" class="mb-10 font-display text-lg text-ink" title="Beranda — Points of Curiosity">PoC</a>
    <div class="flex flex-col gap-7">
      <a href="index.html" class="nav-icon" title="Beranda" aria-label="Beranda">
        <i data-lucide="book-open" class="w-5 h-5"></i>
      </a>
      <a href="index.html#search" class="nav-icon" title="Cari catatan" aria-label="Cari catatan">
        <i data-lucide="search" class="w-5 h-5"></i>
      </a>
      <a href="perpustakaan.html" class="nav-icon" title="Perpustakaan" aria-label="Buka perpustakaan buku" style="color: var(--accent);">
        <i data-lucide="library" class="w-5 h-5"></i>
      </a>
    </div>
  </nav>

  <nav aria-label="Navigasi utama" class="lg:hidden flex fixed bottom-0 inset-x-0 z-30 justify-around items-center h-16 bg-white border-t border-stone-200">
    <a href="index.html" class="nav-icon p-2" title="Beranda" aria-label="Beranda">
      <i data-lucide="book-open" class="w-6 h-6"></i>
    </a>
    <a href="index.html#search" class="nav-icon p-2" title="Cari catatan" aria-label="Cari catatan">
      <i data-lucide="search" class="w-6 h-6"></i>
    </a>
    <a href="perpustakaan.html" class="nav-icon p-2" title="Perpustakaan" aria-label="Buka perpustakaan buku" style="color: var(--accent);">
      <i data-lucide="library" class="w-6 h-6"></i>
    </a>
  </nav>

  <!-- ============ Konten utama ============ -->
  <main class="lg:pl-20 pb-24 lg:pb-0 min-h-screen">
    <div class="max-w-5xl mx-auto px-6 py-12 lg:py-16">

      <header class="mb-8">
        <h1 class="font-display text-3xl sm:text-4xl text-ink">Perpustakaan</h1>
        <p class="mt-2 text-sm text-stone-500">Buku yang sudah, sedang, dan ingin dibaca.</p>
      </header>

      <!-- Filter status baca -->
      <div role="group" aria-label="Filter status baca" class="flex flex-wrap gap-2 mb-8">
        <button type="button" data-status="" class="filter-btn">Semua</button>
        <button type="button" data-status="sedang_dibaca" class="filter-btn">Sedang Dibaca</button>
        <button type="button" data-status="sudah_dibaca" class="filter-btn">Sudah Dibaca</button>
        <button type="button" data-status="ingin_dibaca" class="filter-btn">Ingin Dibaca</button>
      </div>

      <p id="result-count" class="text-xs text-stone-400 tracking-wide uppercase mb-4" aria-live="polite"></p>

      <div id="buku-grid" class="view-transition" aria-live="polite"></div>

    </div>
  </main>

  <style>
    .filter-btn {
      font-size: 0.8125rem;
      padding: 0.375rem 0.875rem;
      border-radius: 999px;
      border: 1px solid var(--rule);
      background: #fff;
      color: #57534e;
      transition: background-color 200ms ease, color 200ms ease, border-color 200ms ease;
    }
    .filter-btn.is-active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
  </style>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    /**
     * ---------------------------------------------------------------------
     * DATA DUMMY (mode demo) — mensimulasikan dist/data/buku-katalog.json
     * Dipakai sebagai fallback kalau fetch gagal (file:// tanpa server,
     * atau dist/data/ belum diekspor).
     * ---------------------------------------------------------------------
     */
    const DUMMY_BUKU_KATALOG = [
      {
        id: 4, judul: "Cosmos", subjudul: null, slug: "cosmos",
        penulis: "Carl Sagan", kategori: "Sains", status_baca: "ingin_dibaca",
        gambar_url: null, tahun_terbit: 1980,
        ringkasan: "Menjelajahi alam semesta dan sejarah sains lewat narasi yang puitis, menghubungkan astronomi, biologi, dan sejarah peradaban manusia.",
        tanggal_ditambahkan: "2026-06-08 10:00:00",
      },
      {
        id: 3, judul: "Clean Code", subjudul: "A Handbook of Agile Software Craftsmanship", slug: "clean-code-a-handbook-of-agile-software-craftsmanship",
        penulis: "Robert C. Martin", kategori: "Teknologi", status_baca: "sedang_dibaca",
        gambar_url: null, tahun_terbit: 2008,
        ringkasan: "Panduan praktis menulis kode yang mudah dibaca dan dirawat, dengan studi kasus refactoring dan prinsip-prinsip clean code.",
        tanggal_ditambahkan: "2026-05-20 10:00:00",
      },
      {
        id: 2, judul: "Thinking, Fast and Slow", subjudul: null, slug: "thinking-fast-and-slow",
        penulis: "Daniel Kahneman", kategori: "Psikologi", status_baca: "sudah_dibaca",
        gambar_url: null, tahun_terbit: 2011,
        ringkasan: "Membedah dua sistem berpikir manusia, cepat-intuitif dan lambat-analitis, serta bagaimana keduanya memengaruhi keputusan sehari-hari.",
        tanggal_ditambahkan: "2026-05-08 10:00:00",
      },
      {
        id: 1, judul: "Sapiens", subjudul: "Riwayat Singkat Umat Manusia", slug: "sapiens-riwayat-singkat-umat-manusia",
        penulis: "Yuval Noah Harari", kategori: "Sejarah", status_baca: "sudah_dibaca",
        gambar_url: null, tahun_terbit: 2017,
        ringkasan: "Menelusuri perjalanan Homo sapiens dari pemburu-pengumpul hingga penguasa planet, menyoroti bagaimana mitos bersama membentuk peradaban.",
        tanggal_ditambahkan: "2026-04-01 10:00:00",
      },
    ];

    const STATUS_LABEL = {
      ingin_dibaca: "Ingin Dibaca",
      sedang_dibaca: "Sedang Dibaca",
      sudah_dibaca: "Sudah Dibaca",
    };

    const state = { data: [], status: "" };

    async function loadBukuKatalog() {
      try {
        const res = await fetch("data/buku-katalog.json");
        if (!res.ok) throw new Error("HTTP " + res.status);
        const json = await res.json();
        if (!Array.isArray(json)) throw new Error("Format buku-katalog.json tidak sesuai");
        return json;
      } catch (err) {
        console.warn("[POC] Gagal memuat ./data/buku-katalog.json, memakai data contoh (mode demo). Detail:", err.message);
        return DUMMY_BUKU_KATALOG;
      }
    }

    function escapeHTML(str) {
      const div = document.createElement("div");
      div.textContent = String(str ?? "");
      return div.innerHTML;
    }

    function bukuCoverHTML(item) {
      if (item.gambar_url) {
        return `<img src="${escapeHTML(item.gambar_url)}" alt="Sampul buku ${escapeHTML(item.judul)}" class="buku-cover" loading="lazy" />`;
      }
      return `<div class="buku-cover-placeholder"><i data-lucide="book" class="w-8 h-8"></i></div>`;
    }

    function emptyStateHTML() {
      return `
        <div class="text-center py-16 border border-dashed border-stone-300 rounded-md">
          <p class="text-sm text-stone-500">Belum ada buku pada kategori status ini.</p>
        </div>`;
    }

    function renderGrid() {
      const container = document.getElementById("buku-grid");
      const items = state.status ? state.data.filter((b) => b.status_baca === state.status) : state.data;
      document.getElementById("result-count").textContent = `${items.length} buku`;

      const html = items.length === 0 ? emptyStateHTML() : `
        <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-5">
          ${items.map((item) => `
            <a href="buku.html#${encodeURIComponent(item.slug)}" class="buku-card">
              ${bukuCoverHTML(item)}
              <div class="p-3">
                <span class="status-pill status-${item.status_baca}">${STATUS_LABEL[item.status_baca] || item.status_baca}</span>
                <h2 class="font-display text-sm text-ink mt-2 leading-snug line-clamp-2">${escapeHTML(item.judul)}</h2>
                <p class="text-xs text-stone-400 mt-1">${escapeHTML(item.penulis || "Penulis tidak diketahui")}</p>
              </div>
            </a>`).join("")}
        </div>`;

      container.classList.add("view-hidden");
      setTimeout(() => {
        container.innerHTML = html;
        lucide.createIcons();
        requestAnimationFrame(() => container.classList.remove("view-hidden"));
      }, 180);
    }

    function setStatus(status) {
      state.status = status;
      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.classList.toggle("is-active", btn.dataset.status === status);
      });
      renderGrid();
    }

    document.addEventListener("DOMContentLoaded", async () => {
      lucide.createIcons();

      document.querySelectorAll(".filter-btn").forEach((btn) => {
        btn.addEventListener("click", () => setStatus(btn.dataset.status));
      });

      state.data = await loadBukuKatalog();
      setStatus("");
    });
  </script>
</body>
</html>
