name: Build & Deploy ke GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # tombol "Run workflow" manual di GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Tailwind CSS
        # Hanya install tailwindcss — tidak perlu better-sqlite3/express/multer
        # yang butuh native compilation dan tidak dipakai di sini.
        run: |
          npm install tailwindcss
          npx tailwindcss -i ./src/input.css -o ./tailwind.css --minify

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload seluruh folder root — file sensitif (database.sqlite, server.js,
          # editor/) sudah diproteksi oleh .gitignore sehingga tidak ada di repo.
          path: '.'

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4